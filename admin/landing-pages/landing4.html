<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACS Photography UK | Landing 4</title>
  <style>
    :root {
      --wall: #fbfaf7;
      --paper: #ffffff;
      --ink: #202528;
      --muted: #6c7275;
      --line: rgba(32, 37, 40, 0.16);
      --accent: #2f4a3b;
      --warm: #a36d43;
      --radius: 8px;
      --shadow: 0 28px 80px rgba(32, 37, 40, 0.14);
      --content: 1200px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--wall);
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gallery-wall {
      min-height: 100vh;
      padding: 30px;
      background:
        linear-gradient(90deg, transparent 0, transparent calc(50% - 1px), rgba(32, 37, 40, 0.06) 50%, transparent calc(50% + 1px)),
        var(--wall);
    }

    .header {
      width: min(100%, var(--content));
      margin: 0 auto 28px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 18px;
      align-items: center;
    }

    .logo {
      color: var(--ink);
      font-size: 1.05rem;
      font-weight: 800;
      text-decoration: none;
    }

    .room-note {
      justify-self: center;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .header-line {
      justify-self: end;
      width: min(180px, 100%);
      height: 1px;
      background: var(--line);
    }

    .exhibit {
      width: min(100%, var(--content));
      min-height: calc(100vh - 98px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 96px minmax(360px, 1.05fr) minmax(320px, 0.78fr);
      gap: clamp(24px, 4vw, 60px);
      align-items: center;
    }

    .side-label {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .framed-work {
      position: relative;
      overflow: hidden;
      min-height: 620px;
      aspect-ratio: 5 / 6;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .image-stage {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 100%;
      border-radius: calc(var(--radius) - 2px);
      background: #ebe6dc;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      animation: fadeWork 18s infinite;
    }

    .slide:nth-child(2) {
      animation-delay: 6s;
    }

    .slide:nth-child(3) {
      animation-delay: 12s;
    }

    .caption-card {
      position: absolute;
      left: 30px;
      right: 30px;
      bottom: 30px;
      padding: 16px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(12px);
    }

    .caption-card strong {
      display: block;
      margin-bottom: 4px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.28rem;
      font-weight: 500;
    }

    .caption-card span {
      color: var(--muted);
      line-height: 1.45;
    }

    .copy {
      align-self: center;
      max-width: 500px;
    }

    .number {
      display: block;
      margin-bottom: 22px;
      color: var(--warm);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 4rem;
      line-height: 1;
    }

    h1 {
      margin: 0 0 24px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3rem, 6vw, 6.2rem);
      line-height: 0.94;
      font-weight: 500;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: clamp(1.06rem, 1.45vw, 1.24rem);
      line-height: 1.68;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 26px;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: #ffffff;
      background: var(--accent);
      font-weight: 900;
      text-decoration: none;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .button:hover,
    .button:focus {
      color: var(--accent);
      background: transparent;
      transform: translateY(-2px);
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 34px;
    }

    .thumb {
      overflow: hidden;
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
    }

    @keyframes fadeWork {
      0% {
        opacity: 0;
        transform: scale(1.05);
      }

      8%,
      31% {
        opacity: 1;
      }

      41%,
      100% {
        opacity: 0;
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide {
        animation: none;
      }

      .slide:first-child {
        opacity: 1;
      }

      .button {
        transition: none;
      }
    }

    @media (max-width: 980px) {
      .exhibit {
        grid-template-columns: 1fr;
      }

      .side-label {
        writing-mode: initial;
        transform: none;
      }

      .framed-work {
        max-width: 680px;
        min-height: 520px;
      }
    }

    @media (max-width: 640px) {
      .gallery-wall {
        padding: 18px;
      }

      .header {
        grid-template-columns: 1fr;
      }

      .room-note,
      .header-line {
        justify-self: start;
      }

      .header-line {
        width: 100%;
      }

      .framed-work {
        min-height: 360px;
        aspect-ratio: 4 / 5;
        padding: 8px;
      }

      .caption-card {
        left: 18px;
        right: 18px;
        bottom: 18px;
      }

      h1 {
        font-size: clamp(2.8rem, 16vw, 4.8rem);
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="gallery-wall">
    <header class="header">
      <a class="logo" href="home.php">acsphotographyuk.co.uk</a>
      <span class="room-note">Private viewing</span>
      <span class="header-line"></span>
    </header>

    <section class="exhibit" aria-label="ACS Photography UK landing page">
      <div class="side-label">ACS Photography UK / Selected Work</div>

      <figure class="framed-work">
        <div class="image-stage">
          <div class="slide"><img src="images/Heswall%20Boat%20Graveyard/p9010054-.jpg" alt="Boat graveyard photography"></div>
          <div class="slide"><img src="images/Kingfishers%20Shropshire/Z72_3195-Enhanced-NR-Edit.jpg" alt="Kingfisher photography"></div>
          <div class="slide"><img src="images/Peak%20District/Z72_6139-Enhanced-NR-Edit.jpg" alt="Peak District landscape photography"></div>
        </div>
        <figcaption class="caption-card">
          <strong>Selected moments</strong>
          <span>Landscape, wildlife, texture, stillness, and atmosphere.</span>

      <div class="copy">

        <p>Images made to slow the eye: weather on water, birds in motion, paths through light, and the details that make the ordinary feel rare.</p>
        <a class="button" href="home.php">Enter Site</a>

        <div class="thumbs" aria-label="Photography themes">
          <div class="thumb"><img src="images/The%20Forest%20Path.JPG" alt="Forest path photography"></div>
          <div class="thumb"><img src="images/eagle%20eyes.jpg" alt="Bird of prey photography"></div>
          <div class="thumb"><img src="images/stunning%20flowers.jpg" alt="Flower photography"></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
