<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACS Photography UK | Landing 1</title>
  <style>
    :root {
      --paper: #f8f4ec;
      --ink: #20272a;
      --muted: #62696d;
      --accent: #6f4825;
      --line: rgba(32, 39, 42, 0.14);
      --radius: 8px;
      --shadow: 0 26px 70px rgba(32, 39, 42, 0.16);
      --content: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .page {
      min-height: 100vh;
      padding: 28px;
      background:
        linear-gradient(90deg, rgba(32, 39, 42, 0.055) 1px, transparent 1px) 0 0 / 90px 90px,
        linear-gradient(135deg, #fbf8f1 0%, #eee6d9 100%);
    }

    .header,
    .hero {
      width: min(100%, var(--content));
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 34px;
    }

    .logo {
      color: var(--ink);
      font-size: 1.08rem;
      font-weight: 800;
      text-decoration: none;
    }

    .hero {
      min-height: calc(100vh - 100px);
      display: grid;
      grid-template-columns: minmax(0, 0.86fr) minmax(360px, 1.14fr);
      gap: clamp(34px, 5vw, 76px);
      align-items: center;
    }

    .copy {
      max-width: 620px;
    }

    .kicker {
      margin: 0 0 18px;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 26px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.8rem, 8vw, 7.2rem);
      line-height: 0.9;
      font-weight: 500;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: clamp(1.08rem, 1.5vw, 1.3rem);
      line-height: 1.65;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 26px;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: #ffffff;
      background: var(--accent);
      font-weight: 800;
      text-decoration: none;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .button:hover,
    .button:focus {
      color: var(--accent);
      background: transparent;
      transform: translateY(-2px);
    }

    .image-wall {
      display: grid;
      grid-template-columns: 0.82fr 1fr;
      gap: clamp(14px, 2vw, 22px);
      align-items: center;
    }

    .frame {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .frame--tall {
      min-height: 520px;
      aspect-ratio: 4 / 5;
    }

    .frame--wide {
      min-height: 340px;
      aspect-ratio: 5 / 4;
      margin-top: 78px;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      animation: fadeSlide 15s infinite;
    }

    .slide:nth-child(2) {
      animation-delay: 5s;
    }

    .slide:nth-child(3) {
      animation-delay: 10s;
    }

    @keyframes fadeSlide {
      0% {
        opacity: 0;
        transform: scale(1.08);
      }

      8%,
      30% {
        opacity: 1;
      }

      38%,
      100% {
        opacity: 0;
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide {
        animation: none;
      }

      .slide:first-child {
        opacity: 1;
      }

      .button {
        transition: none;
      }
    }

    @media (max-width: 900px) {
      .page {
        padding: 22px;
      }

      .hero {
        min-height: auto;
        grid-template-columns: 1fr;
      }

      .image-wall {
        max-width: 720px;
      }
    }

    @media (max-width: 620px) {
      .page {
        padding: 18px;
      }

      h1 {
        font-size: clamp(3rem, 17vw, 4.8rem);
      }

      .image-wall {
        grid-template-columns: 1fr;
      }

      .frame--tall,
      .frame--wide {
        min-height: 280px;
        aspect-ratio: 16 / 10;
        margin-top: 0;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <a class="logo" href="/home.php">acsphotographyuk.co.uk</a>
    </header>

    <section class="hero" aria-label="ACS Photography UK landing page">
      <div class="copy">
        <p class="kicker">ACS Photography UK</p>
        <h1>The Art of Capturing Moments</h1>
        <p>Photography shaped by light, patience, and the details that make a moment worth keeping.</p>
        <p>Explore landscapes, creatures in nature, and quiet stories seen through the lens.</p>
        <a class="button" href="/home.php">Enter Site</a>
      </div>

      <div class="image-wall" aria-label="Photography preview">
        <div class="frame frame--tall">
          <div class="slide"><img src="images/Peak%20District/Z72_5902-Enhanced-NR.jpg" alt="Peak District landscape photography"></div>
          <div class="slide"><img src="images/The%20Forest%20Path.JPG" alt="Forest path photography"></div>
          <div class="slide"><img src="images/beach%20storm%20coming.jpg" alt="Beach storm photography"></div>
        </div>
        <div class="frame frame--wide">
          <div class="slide"><img src="images/eagle%20eyes.jpg" alt="Bird of prey photography"></div>
          <div class="slide"><img src="images/3384%20kingfishers.jpg" alt="Kingfisher photography"></div>
          <div class="slide"><img src="images/busy%20bee.jpg" alt="Bee nature photography"></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
